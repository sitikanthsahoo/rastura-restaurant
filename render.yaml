services:
  # Backend API Service
  - type: web
    name: rastura-api
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        sync: false   # Set this manually in Render dashboard
      - key: JWT_SECRET
        sync: false   # Set this manually in Render dashboard
      - key: RAZORPAY_KEY_ID
        sync: false   # Set this manually in Render dashboard
      - key: RAZORPAY_KEY_SECRET
        sync: false   # Set this manually in Render dashboard

  # Frontend Static Site
  - type: web
    name: rastura-frontend
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        sync: false   # Set to your backend URL from above service
      - key: VITE_RAZORPAY_KEY_ID
        sync: false
